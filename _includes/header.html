{% raw %}{% capture site_title %}{{ site.title | default: site.name | default: page.title }}{% endcapture %}
<header class="site-header">
  <div class="wrapper">
    <h1 class="site-title"><a href="{{ "/" | relative_url }}">{{ site_title }}</a></h1>
    <nav class="site-nav" aria-label="Primary navigation">
      <ul class="site-nav-links">
        {% for item in site.data.navigation %}
          <li class="site-nav-item">
            <a href="{{ item.url | relative_url }}" class="site-nav-link">{{ item.title }}</a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>{% endraw %}
